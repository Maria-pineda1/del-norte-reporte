<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte Ejecutivo · Del Norte by Windmar Home</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0f172a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .nav {
    background: #1e293b;
    border-bottom: 1px solid #334155;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .nav-title {
    color: #94a3b8;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-right: 8px;
  }
  .tab-btn {
    padding: 8px 24px;
    border-radius: 8px;
    border: 1.5px solid #334155;
    background: transparent;
    color: #94a3b8;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .tab-btn:hover {
    border-color: #64748b;
    color: #cbd5e1;
  }
  .tab-btn.active {
    background: #3b82f6;
    border-color: #3b82f6;
    color: #fff;
  }
  .frame-wrap {
    flex: 1;
    position: relative;
  }
  iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: none;
  }
  iframe.active {
    display: block;
  }
</style>
</head>
<body>

<div class="nav">
  <span class="nav-title">Del Norte · Reportes</span>
  <button class="tab-btn active" onclick="show('mayo', this)">Mayo 2026</button>
  <button class="tab-btn" onclick="show('junio', this)">Junio 2026</button>
</div>

<div class="frame-wrap">
  <iframe id="mayo" class="active" src="reporte_ejecutivo_del_norte_mayo2026.html"></iframe>
  <iframe id="junio" src="reporte_ejecutivo_del_norte_mayo2026_claro.html"></iframe>
</div>

<script>
  function show(id, btn) {
    document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
  }
</script>

</body>
</html>
